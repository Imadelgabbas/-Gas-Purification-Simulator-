<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gas Purification Simulator - analyze, simulate and optimize gas purification processes.">
    <title>{% block title %}Gas Purification Simulator{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --gps-primary: #0d6efd;
            --gps-primary-dark: #0b5ed7;
            --gps-bg: #f3f6fb;
            --gps-surface: #ffffff;
            --gps-border: #dbe6f3;
            --gps-text: #163047;
            --gps-muted: #6b7a90;
            --gps-dark: #0f172a;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #f8fbff 0%, var(--gps-bg) 100%);
            color: var(--gps-text);
        }

        .navbar-gps {
            background: linear-gradient(90deg, #0b1730 0%, #12284a 100%);
        }

        .navbar-gps .nav-link {
            color: rgba(255, 255, 255, 0.82);
            font-weight: 500;
            border-radius: 999px;
            padding: 0.5rem 0.9rem;
            transition: all 0.2s ease;
        }

        .navbar-gps .nav-link:hover,
        .navbar-gps .nav-link.active {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
        }

        .navbar-gps .navbar-toggler {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .brand-mark {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(13, 110, 253, 0.95), rgba(13, 110, 253, 0.55));
            color: #ffffff;
            box-shadow: 0 10px 24px rgba(13, 110, 253, 0.28);
            flex-shrink: 0;
        }

        .brand-title {
            color: #ffffff;
            font-weight: 700;
            letter-spacing: 0.01em;
        }

        .brand-subtitle {
            color: rgba(255, 255, 255, 0.65);
            font-size: 0.68rem;
            letter-spacing: 0.16em;
        }

        .page-shell {
            padding-top: 3rem;
            padding-bottom: 3rem;
        }

        .page-hero,
        .app-card {
            background: var(--gps-surface);
            border: 1px solid var(--gps-border);
            border-radius: 1.5rem;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.06);
        }

        .page-hero {
            padding: 3rem;
            background-image: radial-gradient(circle at top right, rgba(13, 110, 253, 0.13), transparent 28%);
        }

        .section-label {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--gps-primary);
            margin-bottom: 1rem;
        }

        .section-label i {
            width: 1.75rem;
            height: 1.75rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            background: rgba(13, 110, 253, 0.1);
        }

        .app-card {
            padding: 1.75rem;
        }

        .app-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }

        .app-card-title {
            margin: 0;
            font-size: 1.15rem;
            font-weight: 700;
        }

        .soft-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.45rem 0.8rem;
            border-radius: 999px;
            background: rgba(13, 110, 253, 0.08);
            color: var(--gps-primary);
            font-size: 0.82rem;
            font-weight: 600;
        }

        .icon-tile {
            width: 3rem;
            height: 3rem;
            border-radius: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(13, 110, 253, 0.1);
            color: var(--gps-primary);
            font-size: 1.1rem;
        }

        .metric-value {
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1;
            color: var(--gps-dark);
        }

        .metric-caption {
            color: var(--gps-muted);
            font-size: 0.95rem;
        }

        .chart-card {
            min-height: 100%;
        }

        .chart-frame {
            min-height: 360px;
        }

        .form-control,
        .form-select {
            border-radius: 0.95rem;
            border-color: #d8e1ec;
            padding: 0.85rem 1rem;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: rgba(13, 110, 253, 0.45);
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.12);
        }

        .btn {
            border-radius: 999px;
            font-weight: 600;
            padding: 0.75rem 1.25rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gps-primary), var(--gps-primary-dark));
            border: none;
            box-shadow: 0 12px 24px rgba(13, 110, 253, 0.2);
        }

        .btn-outline-primary {
            border-width: 2px;
        }

        .footer-shell {
            border-top: 1px solid rgba(15, 23, 42, 0.08);
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(8px);
        }

        @media (max-width: 991.98px) {
            .page-hero,
            .app-card {
                padding: 1.5rem;
                border-radius: 1.25rem;
            }

            .brand-title {
                font-size: 0.96rem;
            }

            .brand-subtitle {
                display: none;
            }
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-gps shadow-sm sticky-top py-3">
        <div class="container-xxl">
            <a class="navbar-brand d-flex align-items-center gap-3 me-4" href="{{ url_for('home') }}">
                <span class="brand-mark">
                    <i class="fa-solid fa-atom"></i>
                </span>
                <span class="d-flex flex-column lh-sm">
                    <span class="brand-title">Gas Purification Simulator</span>
                    <span class="brand-subtitle">Process Analysis Suite</span>
                </span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-lg-2 mt-3 mt-lg-0">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'home' %}active{% endif %}" href="{{ url_for('home') }}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'input_page' %}active{% endif %}" href="{{ url_for('input_page') }}">Input</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'result' %}active{% endif %}" href="{{ url_for('result') }}">Results</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint in ['simulation', 'simulation_results', 'case_study_simulation'] %}active{% endif %}" href="{{ url_for('simulation') }}">Simulation</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="page-shell">
        <div class="container-xxl">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer-shell py-4">
        <div class="container-xxl d-flex flex-column flex-md-row justify-content-between align-items-center gap-2">
            <p class="mb-0 text-secondary">
                <i class="fa-regular fa-copyright me-2"></i>2026 Gas Purification Simulator
            </p>
            <p class="mb-0 text-secondary small">Analyze, simulate and optimize gas purification processes</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
